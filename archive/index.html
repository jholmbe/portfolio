<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Justin Holmberg</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-okaidia.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
  </head>
  <body
    class="bg-primary text-secondary mx-5 font-sans font-light sm:mx-16 sm:my-12 sm:grid sm:grid-cols-[1fr_3fr] sm:gap-8"
  >
    
    <div class="sm:hidden">
      <div class="flex h-[10vh] items-center justify-between">
        <a class="text-xl font-medium tracking-widest uppercase" href="/"
          >Justin Holmberg</a
        >
        <button id="menu-toggle" class="py-2 pl-2" aria-label="Toggle menu">
          <svg id="menu-icon" class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
          <svg
            id="close-icon"
            class="hidden h-6 w-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>
      <nav
        id="mobile-menu"
        class="bg-primary *:border-secondary hidden h-[92vh] flex-col items-center justify-center gap-6 text-base uppercase *:mx-4 *:w-9/10 *:border-b *:pb-2 *:text-start *:font-mono"
      >
        <a href="/#projects">projects</a>
        <a href="/#about">About</a>
        <a href="/#connect">Connect</a>
      </nav>
    </div>

    <script>
      const toggle = document.getElementById("menu-toggle");
      const menu = document.getElementById("mobile-menu");
      const menuIcon = document.getElementById("menu-icon");
      const closeIcon = document.getElementById("close-icon");
      const menuLinks = menu.querySelectorAll("a");

      function closeMenu() {
        menu.classList.add("hidden");
        menu.classList.remove("flex");
        menuIcon.classList.remove("hidden");
        closeIcon.classList.add("hidden");
      }

      toggle.addEventListener("click", () => {
        menu.classList.toggle("hidden");
        menu.classList.toggle("flex");
        menuIcon.classList.toggle("hidden");
        closeIcon.classList.toggle("hidden");
      });

      menuLinks.forEach((link) => {
        link.addEventListener("click", closeMenu);
      });
    </script>

    
    <div class="hidden flex-col gap-5 uppercase sm:col-start-1 sm:flex">
      <div>
        <a class="text-xl font-medium tracking-widest whitespace-nowrap" href="/"
          >Justin Holmberg</a
        >
      </div>
      <ul class="space-y-4 font-mono text-base">
        <li><a class="nav-link" href="/#projects">Projects</a></li>
        <li><a class="nav-link" href="/#about">About Me</a></li>
        <li><a class="nav-link" href="/#connect">Connect</a></li>
      </ul>
    </div>

    
<div class="sm:col-start-2">
   <div class="pb-6">
  <a class="project-card block" href="/snake-game/">
    <img
      class="project-cover-img max-w-full pb-4"
      src="/assets/snake-imgs/snake-cover-img.png"
      alt="Snake Game interface"
    />
    <div class="text-sm font-light">
       HTML/CSS | JavaScript | Figma 
    </div>
    <h1 class="pt-0.5 text-xl font-medium tracking-wide uppercase">Snake Game</h1>
    <div class="font-mono text-base">browser-based arcade classic with custom UI</div>
    <div class="divider bg-secondary my-4 h-px w-0"></div>
  </a>
</div>
 
</div>


    <script>
      const dividers = document.querySelectorAll(".divider");
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("animate-expand");
              observer.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.5 },
      );
      dividers.forEach((divider) => observer.observe(divider));
    </script>
  </body>
</html>
